<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04_객체와 배열</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; padding: 24px; }
        code { background: #f3f3f3; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>04_객체와 배열</h1>
    <p>객체는 관련 있는 값을 하나로 묶어 표현할 때 사용한다.</p>
    <p>배열은 여러 값을 순서대로 관리할 때 사용한다.</p>

    <script>
        console.group('1. 객체 리터럴 생성');
        {
            // 객체는 관련 있는 값은 key-value 형태로 묶어 표현한다.
            // 객체 안의 값은 프로퍼티, 객체 안의 함수는 메서드라고 한다.
            const student = {
                name: '유관순',
                age: 16,
                getInfo: function() {
                    // this는 현재 메서드를 호출한 객체를 가리킨다.
                    return `${this.name}(은)는 ${this.age}세입니다.`;
                }
            };

            console.log(student)
            console.log(typeof student)
            console.log(student.getInfo())

            // 빈 객체를 만든 뒤 나중에 프로퍼티를 추가할 수도 있다.
            const student2 = {};
            console.log(student2)
        }
        console.groupEnd();

        console.group('2. 프로퍼티와 메소드');
        {
            const obj = {
                normal: 'normal value',
                // 공백이나 특수문자가 포함 된 프로퍼티 이름은 따옴표로 감싼다.
                '@ s p a c e @': 'space value',
                // 숫자 형태의 프로퍼티 이름도 사용할 수 있다.
                0: 1,
                // 예약어도 프로퍼티 이름으로 사용할 수 있다.
                let: 'let',
                // 같은 이름의 프로퍼티를 중복 작성하면 뒤의 값으로 덮어쓴다.
                normal: 'new value'
            };
            console.log(obj);

            const dog = {
                name: '뽀삐',
                eat: function(food) {
                    console.log(`${this.name}(은)는 ${food}를 맛있게 먹어요~`);
                }
            };

            // 객체의 메서드는 객체명.메서드명() 형태로 호출한다.
            dog.eat('고구마');
        }
        console.groupEnd();

        console.group('3. 프로퍼티 접근, 추가, 수정, 삭제');
        {
            const dog = {
                name: '뽀삐',
                eat: function(food) {
                    console.log(`${this.name}(은)는 ${food}를 맛있게 먹어요~`);
                }
            };

            // 일반적인 프로퍼티는 점 표기법으로 접근할 수 있다.
            console.log(dog.name);

            // 대괄호 표기법은 프로퍼티 이름은 문자열로 지정한다.
            console.log(dog['name']);

            const obj = {
                'dash-key' : 'dash-value',
                0: 1
            }

            // 특수 문자가 포함 된 프로퍼티는 대괄호 표기법으로 접근한다.
            // console.log(obj.dash-key);
            console.log(obj['dash-key']);

            // 숫자 프로퍼티는 숫자 또는 문자열 형태로 접근할 수 있다.
            // console.log(obj.0)
            console.log(obj['0'])
            console.log(obj[0])

            // 프로퍼티 수정
            dog.name = '두부'
            console.log(dog)

            // 프로퍼티 추가
            dog.age = 3
            console.log(dog)

            // 프로퍼티 삭제
            delete dog.age;
            console.log(dog);

            // const로 선언 된 변수에 객체 재할당은 불가하며 
            // 객체 프로퍼티 수정은 문제 없다.
            // dog = {};
        }
        console.groupEnd();


        console.group('4. 객체 단축 문법과 in, for ...in');
        {
            const id = 'p-001';
            const price = 30000;

            // 변수명과 프로퍼티명이 같으면 단축 문법으로 작성할 수 있다.
            // const product = { id:id, price:price };
            const product = { id, price };
            console.log(product)

            const dog = {
                name: '두부',
                // 메서드는 function 키워드 없이 축약해서 작성할 수 있다.
                eat(food) {
                    console.log(`${this.name}(은)는 ${food}를 맛있게 먹어요`);
                }
            }
            dog.eat('닭가슴살');

            // in 연산자는 프로퍼티가 객체 안에 존재하는지 확인한다.
            console.log('name' in dog);
            console.log('test' in dog);

            // for ...in은 객체의 프로퍼티 key를 순회할 때 사용한다.
            for(const key in dog) {
                console.log(`key : ${key}`);
                // key가 변수에 담겨있으므로 대괄호 표기법으로 값에 접근한다.
                // console.log(dog.key);
                console.log(dog[key]);
            }
        }
        console.groupEnd();

        console.group('5. 배열 생성과 순회');
        {
            // 배열은 여러 값을 순서대로 관리하는 자료구조이다.
            const arr = ['바나나', '복숭아', '키위'];
            console.log(arr);

            // 배열은 리터럴 표기법 [] 를 주로 사용한다.
            // new Array() 방식은 동작 차이가 생길 수 있어 주의해야 한다.
            const arr2 = new Array();
            const arr3 = new Array(10);
            const arr4 = new Array(1, 2, 3);
            console.log(arr2);
            console.log(arr3);
            console.log(arr4);

            // Array.of()는 전달한 값을 그대로 요소로 가진 배열을 만든다.
            console.log(Array.of(10));
            console.log(Array.of(1, 2, 3));

            // 배열 요소는 0번 인덱스부터 접근한다.
            console.log(arr[0]);
            console.log(arr[1]);
            console.log(arr[2]);

            // length는 배열의 요소 개수를 나타낸다.
            console.log(arr.length);

            // 일반 for문은 인덱스를 직접 제어하며 배열을 순회할 수 있다.
            for(let i = 0; i < arr.length; i++) {
                console.log(arr[i]);
            }

        }
        console.groupEnd();

        console.group('6. length의 배열 요소 추가/삭제');
        {
            const arr = [1, 2, 3, 4, 5];
            console.log(arr.length);

            // push()는 배열의 마지막에 요소를 추가한다.
            arr.push(6);
            console.log(arr);
            console.log(arr.length);

            // pop()은 배열의 마지막 요소를 제거하고 반환한다.
            console.log(arr.pop());
            console.log(arr);
            console.log(arr.length);

            // length를 줄이면 뒤쪽 요소가 삭제 된다.
            arr.length = 3;
            console.log(arr);

            // length를 늘리면 빈 슬롯이 생긴다.
            arr.length = 10;
            console.log(arr);

            // 중간이 비어있는 배열을 희소 배열이라고 한다.
            const sparse = [, 2, , 4];
            console.log(sparse);
            console.log(sparse.length);

            // for ...in은 배열의 인덱스 key를 순회한다.
            // 배열 값 순회에는 일반적으로 for ...of가 더 적절한다.
            for(const key in arr) {
                console.log(`key: ${key}`);
            }
            
            // for ...of는 배열의 값을 순회한다. (length 프로퍼티 수에 맞춰서)
            for(const item of arr) {
                console.log(`item: ${item}`);
            }

        }
        console.groupEnd();

        console.group('7. 배열 기본 메서드');
        {
            const foodList = ['물회', '삼계탕', '냉면', '수박', '물회'];

            // indexOf()는 앞에서부터 찾은 위치를 반환한다.
            console.log(foodList.indexOf('물회'));

            // lastIndexOf()는 뒤에서부터 찾은 위치를 반환한다.
            console.log(foodList.lastIndexOf('물회'));

            // includes()는 특정 요소가 포함되어 있는지 true/false로 반환한다.
            console.log(foodList.includes('삼겹살'));

            const chineseFood = ['짜장면', '짬뽕', '우동'];

            // push()는 뒤에 추가, pop()은 뒤에서 제거한다.
            chineseFood.push('탕수육', '양장피');
            console.log(chineseFood);
            console.log(chineseFood.pop());
            console.log(chineseFood);

            const chickenList = ['양념치킨', '후라이드', '파닭'];

            // unshift()는 앞에 추가, shift()는 앞에서 제거한다.
            chickenList.unshift('간장치킨');
            console.log(chickenList);
            console.log(chickenList.shift());
            console.log(chickenList);

            const idol1 = ['아이브', '오마이걸'];
            const idol2 = ['트와이스', '에스파'];

            // concat()은 기존 배열을 변경하지 않고 새 배열을 반환한다.
            console.log(idol1.concat(idol2));

            const front = ['HTML', 'CSS', 'JavaScript', 'jQuery'];

            // slice()는 원하는 범위를 잘라 새 배열로 반환하며 원본을 변경하지 않는다.
            console.log(front.slice(1, 3));
            console.log(front);

            // splice()는 배열의 요소를 삭제하거나 교체하며 원본 배열을 변경한다.
            console.log(front.splice(3, 1, 'React'));
            console.log(front);

            const snackList = ['사탕', '초콜렛', '껌', '과자'];

            // join()은 배열 요소를 문자열로 연결한다.
            console.log(snackList.join('/'));

            // reverse()는 배열의 순서를 뒤집으며 원본 배열을 변경한다.
            console.log([1, 2, 3, 4, 5].reverse());
        }
        console.groupEnd();

        console.group('8. 배열 고차 함수');
        {
            let numbers = [];

            // Math.random()은 0 이상 1 미만의 난수를 만든다.
            // Math.floor()는 소수점을 버려 정수로 만든다.
            for (let i = 0; i < 10; i++) {
                numbers[i] = Math.floor(Math.random() * 100) + 1;
            }
            console.log(`정렬 전 numbers : ${numbers}`);

            // sort()의 기본 정렬은 문자열 기준이다.
            // 숫자 배열을 정렬할 때는 비교 함수를 전달해야 한다.
            numbers.sort();
            console.log(`기본 정렬 후 numbers : ${numbers}`);

            // a - b가 음수이면 a가 앞에 오므로 숫자 오름차순 정렬이 된다.
            numbers.sort((a, b) => a - b);
            console.log(`숫자 오름차순 정렬 후 numbers : ${numbers}`);

            // b - a를 사용하면 숫자 내림차순 정렬이 된다.
            numbers.sort((a, b) => b - a);
            console.log(`숫자 내림차순 정렬 후 numbers : ${numbers}`);

            numbers = [1, 2, 3, 4, 5];

            // forEach()는 배열의 각 요소를 하나씩 꺼내 작업을 수행한다.
            // 반환값을 모으지 않고 반복 실행이 목적일 때 사용한다.
            numbers.forEach(item => console.log(item * 10));

            // map()은 각 요소를 변환하여 새 배열을 만든다.
            const types = [true, 1, 'text'].map(item => typeof item);
            console.log(types);

            const lengths = ['apple', 'banana', 'cat', 'dog', 'egg'].map(item => item.length);
            console.log(lengths);

            // filter()는 조건을 만족하는 요소만 모아 새 배열을 만든다.
            const odds = numbers.filter(item => item % 2);
            console.log(odds);

            // reduce()는 배열의 요소를 하나의 값으로 누적한다.
            const sum = numbers.reduce((pre, cur) => pre + cur);
            console.log(`sum : ${sum}`);

            const max = numbers.reduce((pre, cur) => pre > cur ? pre : cur);
            console.log(`max : ${max}`);

            // some()은 하나라도 조건을 만족하면 true를 반환한다.
            let result = [1, 5, 4, 3, 2].some(item => item > 4);
            console.log(result);

            // every()는 모든 요소가 조건을 만족해야 true를 반환한다.
            result = [1, 5, 4, 3, 2].every(item => item > 3);
            console.log(result);

            const students = [
                { name: '홍길동', score: 90 },
                { name: '유관순', score: 80 },
                { name: '장보고', score: 70 }
            ];

            // find()는 조건을 만족하는 첫 번째 요소를 반환한다.
            result = students.find(item => item.name === '유관순');
            console.log(result);

            // findIndex()는 조건을 만족하는 첫 번째 요소의 인덱스를 반환한다.
            result = students.findIndex(item => item.name === '유관순');
            console.log(result);

            // 객체 배열에서도 filter()를 사용해 조건 검색을 할 수 있다.
            result = students.filter(item => item.score >= 80);
            console.log(result);
        }
        console.groupEnd();
    </script>
</body>
</html>
