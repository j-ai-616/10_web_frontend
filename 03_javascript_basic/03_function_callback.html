<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03_함수와 콜백함수</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; padding: 24px; }
        code { background: #f3f3f3; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>03_함수와 콜백함수</h1>
    <p>함수는 자주 사용하는 코드를 이름 붙여 재사용하기 위한 문법이다.</p>
    <p>
        콜백 함수는 다른 함수의 인수로 전달 되는 함수이며, 이벤트와 배열
        고차 함수에서 자주 사용한다.
    </p>
    <script>
        console.group('1. 함수 선언문');
        {
            // 함수 선언문은 function 키워드로 함수를 정의하는 방식이다.
            function hello(name) {
                return `${name}님 안녕하세요!`
            }
            // 함수 이름을 사용해 필요한 시점에 함수를 호출할 수 있다.
            console.log(hello('유관순'))
        }
        console.groupEnd();

        console.group('2. 함수 표현식');
        {
            // 함수 표현식은 함수를 값처럼 변수에 저장하는 방식이다.
            const hello = function(name) {
                return `${name}님 안녕하세요!`;
            }

            console.log(hello('홍길동'))

            // 이름 있는 함수 표현식도 변수에 저장할 수 있다.
            const calc = function add(a, b) {
                return a + b;
            }

            // 외부에서는 변수명인 calc로 호출한다.
            console.log(calc(1, 2));
            // add로 호출할 경우 정의되지 않았다는 오류가 발생한다.
            // console.log(add(1, 2));
        }
        console.groupEnd();

        console.group('3. 매개변수와 인수');
        {
            // 매개변수는 함수 선언 시 값을 받기 위해 작성하는 변수이다.
            // 인수는 함수를 호출할 때 실제로 전달하는 값이다.
            function hello(name) {
                // arguments는 함수에 전달 된 인수를 담고 있는 유사 배열 객체이다.
                console.log('arguments', arguments)
                return `${name}님 안녕하세요~`
            }

            // 인수를 전달하지 않으면 매개변수 값은 undefined가 된다.
            console.log(hello())
            // 매개변수보다 많은 인수를 전달해도 오류가 발생하지 않는다.
            console.log(hello('유관순', '홍길동'))

            // 기본 값 매개변수를 사용하면 인수가 없을 때 사용할 값을 지정할 수 있다.
            function hi(name = '아무개') {
                return `${name}님 안녕!`
            }

            console.log(hi('강감찬'))
            console.log(hi())
        }
        console.groupEnd();

        console.group('4. 반환문');
        {
            // return은 함수 실행 결과를 함수 밖으로 반환한다.
            function func() {
                console.log('함수 호출 됨');

                // return 뒤에 값이 없으면 undefined가 반환 된다.
                return;
            }

            console.log(func());
        }
        console.groupEnd();

        console.group('5. 화살표 함수');
        {
            let message = function () {
                return 'hello world';
            };

            console.log(message());

            // 화살표 함수는 function 키워드 대신 => 를 사용한다.
            message = () => {
                return 'Arrow Function';
            };

            console.log(message());

            // 실행문이 return 하나 뿐이면 중괄호와 return을 생략 할 수 있다.
            message = () => 'Arrow Function2'

            console.log(message());

            // 매개변수가 2개 이상이면 소괄호를 작성한다.
            message = (val1, val2) => 'Arrow ' + val1 + val2

            console.log(message('Function', 'Good'))

            // 매개변수가 1개이면 소괄호를 생략할 수 있다.
            message = val => 'Arrow ' + val

            console.log(message('Function'))
        }
        console.groupEnd();

        console.group('6. 콜백 함수');
        {
            function increase(value) {
                return value + 1;
            }

            function decrease(value) {
                return value - 1;
            }

            // func 매개변수에는 함수가 전달 된다.
            // 전달 받은 함수를 내부에서 다시 호출 한다.
            function apply(func, value) {
                return func(value);
            }

            // apply 고차 함수에
            // increase, decrease 함수를 콜백 함수로 전달한다.
            console.log(apply(increase, 5))
            console.log(apply(decrease, 5))

            // 익명 함수를 apply 고차 함수에 바로 전달할 수 있다.
            console.log(apply(function(value) {
                return value + 1
            }, 10))

            // 화살표 함수를 콜백 함수로 전달할 수도 있다.
            console.log(apply(value => value - 1, 10))

            // sort()는 정렬 기준 함수를 콜백으로 전달 받는다.
            console.log([3, 1, 4, 2, 5].sort((a, b) => b - a))
        }
        console.groupEnd();
    </script>
</body>
</html>
