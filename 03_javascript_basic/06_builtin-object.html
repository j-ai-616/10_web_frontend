<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06_표준 빌트인 객체</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; padding: 24px; }
        code { background: #f3f3f3; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>06_표준 빌트인 객체</h1>
    <p>JavaScript는 자주 사용하는 기능을 표준 빌트인 객체로 제공한다.</p>
    <p>자주 사용하는 Number, Math, Date, String을 가볍게 확인한다.</p>

    <script>
        console.clear();

        console.group('1. Number');
        {
            // Number는 숫자와 관련된 기능을 제공하는 표준 빌트인 객체이다.
            // new Number()는 숫자 객체를 만들지만, 일반적으로는 원시값 숫자를 더 많이 사용한다.
            const numObj = new Number();
            console.log(numObj);

            const numObj2 = new Number(10);
            console.log(numObj2);

            // Number()는 다른 타입의 값을 숫자로 변환할 때 사용한다.
            console.log(Number('10'));
            console.log(Number('10.01'));
            console.log(Number(true));
            console.log(Number(false));

            // Number.isNaN()은 값이 NaN인지 확인한다.
            // NaN은 숫자로 변환할 수 없는 계산 결과를 의미한다.
            console.log(Number.isNaN(NaN));

            // Number.isInteger()는 값이 정수인지 확인한다.
            console.log(Number.isInteger(10));
            console.log(Number.isInteger(10.5));

            // parseInt()는 문자열을 정수로 변환한다.
            // 문자열 앞부분에 숫자가 있으면 숫자로 해석 가능한 부분까지만 변환한다.
            console.log(parseInt('10'));
            console.log(parseInt('10.5'));
            console.log(parseInt('10px'));

            // parseFloat()는 문자열을 실수로 변환한다.
            // 소수점이 포함된 값을 처리할 때 사용한다.
            console.log(parseFloat('10.5'));
            console.log(parseFloat('10.5px'));

            // Number()는 문자열 전체가 숫자 형태여야 변환된다.
            // 따라서 '10px'처럼 숫자가 아닌 문자가 포함되면 NaN이 된다.
            console.log(Number('10px'));
        }
        console.groupEnd();

        console.group('2. Math');
        {
            // Math는 수학 계산에 필요한 기능을 제공하는 객체이다.
            // Math는 생성자 함수가 아니므로 new Math()처럼 사용하지 않는다.
            console.log(Math.PI);

            // abs()는 절댓값을 반환한다.
            console.log(Math.abs(-10));

            // round()는 반올림, ceil()은 올림, floor()는 내림이다.
            console.log(Math.round(10.6));
            console.log(Math.ceil(10.1));
            console.log(Math.floor(10.9));

            // trunc()는 소수점 이하를 버리고 정수 부분만 반환한다.
            // 양수에서는 floor()와 비슷해 보이지만, 음수에서는 결과가 다를 수 있다.
            console.log(Math.trunc(10.9));
            console.log(Math.floor(10.9));
            console.log(Math.trunc(-10.9));
            console.log(Math.floor(-10.9));

            // sqrt()는 제곱근을 구한다.
            console.log(Math.sqrt(4));

            // random()은 0 이상 1 미만의 난수를 반환한다.
            console.log(Math.random());

            // 1부터 100 사이의 정수를 만들기 위해 random(), floor()를 함께 사용한다.
            const random = Math.floor((Math.random() * 100) + 1);
            console.log(`1부터 100 사이의 난수: ${random}`);

            // pow()는 거듭제곱을 계산한다.
            console.log(Math.pow(2, 3));

            // ** 연산자도 거듭제곱 계산에 사용할 수 있다.
            console.log(2 ** 3);

            // max()는 가장 큰 값, min()은 가장 작은 값을 반환한다.
            console.log(Math.max(10, 20, 30));
            console.log(Math.min(10, 20, 30));
        }
        console.groupEnd();

        console.group('3. Date');
        {
            // Date는 날짜와 시간을 다루기 위한 표준 빌트인 객체이다.
            // new Date()는 현재 날짜와 시간을 가진 Date 객체를 만든다.
            console.log(new Date());

            // new Date(0)은 1970년 1월 1일 00:00:00 UTC 기준 시간을 의미한다.
            console.log(new Date(0));

            // 숫자를 전달하면 1970년 1월 1일부터 지난 밀리초로 해석한다.
            console.log(new Date(24 * 60 * 60 * 1000));

            // 문자열을 전달해 날짜 객체를 만들 수 있다.
            console.log(new Date('2022/07/26 09:00:00'));

            // 월은 0부터 시작한다.
            // 따라서 new Date(2022, 1, 1)은 2022년 2월 1일을 의미한다.
            console.log(new Date(2022, 1, 1, 9, 0, 0, 0));

            const now = new Date();

            // getFullYear()는 연도를 반환한다.
            console.log(now.getFullYear());

            // getMonth()는 0부터 시작하므로 실제 월을 표현하려면 1을 더한다.
            console.log(now.getMonth() + 1);

            // getDate()는 일, getHours()는 시간을 반환한다.
            console.log(now.getDate());
            console.log(now.getHours());

            // getDay()는 요일을 숫자로 반환한다.
            // 0은 일요일, 1은 월요일, 2는 화요일 ... 6은 토요일이다.
            console.log(now.getDay());

            // toLocaleDateString()은 현재 지역 형식에 맞는 날짜 문자열을 반환한다.
            console.log(now.toLocaleDateString());

            // toLocaleTimeString()은 현재 지역 형식에 맞는 시간 문자열을 반환한다.
            console.log(now.toLocaleTimeString());

            // toLocaleString()은 현재 지역 형식에 맞는 날짜와 시간 문자열을 반환한다.
            // 화면에 날짜/시간을 출력할 때 직접 년, 월, 일을 조합하는 것보다 간단하게 사용할 수 있다.
            console.log(now.toLocaleString());
        }
        console.groupEnd();

        console.group('4. String');
        {
            // String은 문자열과 관련된 기능을 제공하는 표준 빌트인 객체이다.
            // new String()은 문자열 객체를 만들지만, 일반적으로는 문자열 원시값을 더 많이 사용한다.
            const obj = new String('홍길동');
            console.log(obj);

            // length는 문자열의 길이를 반환한다.
            console.log(obj.length);

            // 문자열도 배열처럼 인덱스로 각 문자에 접근할 수 있다.
            console.log(obj[0]);

            const str = 'JavaScript';

            // indexOf()는 찾는 문자열의 첫 번째 위치를 반환한다.
            console.log(str.indexOf('a'));

            // includes()는 특정 문자열이 포함되어 있는지 true/false로 반환한다.
            console.log(str.includes('Script'));

            // startsWith()는 특정 문자열로 시작하는지 확인한다.
            console.log(str.startsWith('Java'));

            // endsWith()는 특정 문자열로 끝나는지 확인한다.
            console.log(str.endsWith('Script'));

            // charAt()은 특정 위치의 문자를 반환한다.
            console.log(str.charAt(0));

            // substring()은 시작 인덱스부터 종료 인덱스 전까지의 문자열을 반환한다.
            console.log(str.substring(1, 4));

            // slice()도 문자열 일부를 잘라 반환한다.
            // 음수 인덱스를 사용할 수 있어 뒤에서부터 접근할 수 있다.
            console.log(str.slice(-1));

            // toUpperCase()는 대문자, toLowerCase()는 소문자로 변환한다.
            console.log(str.toUpperCase());
            console.log(str.toLowerCase());

            const str2 = '   JavaScript   ';

            // trim()은 문자열 앞뒤의 공백을 제거한다.
            console.log(str2.trim());

            // repeat()은 문자열을 지정한 횟수만큼 반복한다.
            console.log(str.repeat(2));

            // replace()는 첫 번째로 찾은 문자열을 다른 문자열로 바꾼다.
            console.log(str.replace('Java', 'Type'));

            // replaceAll()은 찾은 모든 문자열을 다른 문자열로 바꾼다.
            // 같은 단어가 여러 번 등장하는 문자열을 일괄 수정할 때 사용할 수 있다.
            const text = 'apple banana apple';
            console.log(text.replace('apple', 'orange'));
            console.log(text.replaceAll('apple', 'orange'));

            // padStart()는 문자열의 앞쪽을 지정한 문자로 채워 길이를 맞춘다.
            // 날짜나 시간을 01, 02처럼 두 자리로 표현할 때 자주 사용할 수 있다.
            const month = '6';
            console.log(month.padStart(2, '0'));

            // padEnd()는 문자열의 뒤쪽을 지정한 문자로 채워 길이를 맞춘다.
            console.log(month.padEnd(2, '0'));

            const str3 = 'Hello, Everyone! Nice to see you again.';

            // split()은 문자열을 기준 문자로 나누어 배열로 반환한다.
            console.log(str3.split(' '));
        }
        console.groupEnd();
    </script>
</body>
</html>
